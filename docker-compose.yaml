version: "3.5"

services:
  mcp:
    # image: python:3.11-slim
    build:
      context: ./mcp
    container_name: mcpserver
    working_dir: /app
    # volumes:
    #   - ./mcp:/app
    command: bash -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 3333"
    # env_file:
    #   - .env
    ports:
      - "3535:3333"
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:      # Khai báo mạng ở cấp độ root
    external: true